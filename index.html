<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love-U-Festival</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wdth,wght@0,62.5..100,100..900;1,62.5..100,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            font-family: 'Arial', sans-serif;
            width: 100%;
            height: 100%;
        }

        #container {
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;

        }

        main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            height: 100%;
        }

        header {
            font: 50px 'Noto Sans', sans-serif;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #000;
            color: white;
            text-transform: uppercase;
        }

        #leftSide {
            display: flex;
            align-items: center;
        }

        #leftSide img {
            height: 60px;
            margin: 5px;
            margin-right: 20px;
        }

        #rightSide {
            display: flex;
            align-items: center;
        }

        #rightSide img {
            height: 50px;
            margin: 10px;
        }

        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #F03228;
            color: white;
        }

        footer button {
            padding: 10px 20px;
            font-size: 16px;
            width: 25%;
            height: 70px;
            color: white;
            border: none;
            background-color: transparent;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="container">
        <header>
            <div id="leftSide">
                <div>
                    <img src="logo_white.svg">
                </div>
                <div>festival</div>
            </div>
            <div id="rightSide">
                <div><img src="sun.svg"></div>
                <div><img src="dutch.png"></div>
            </div>
        </header>
        <main>

            <div class="content" id="content1">
                <h1>Welcome to the Love-U-Festival!</h1>
                <p>Experience the best music, food, and fun at our annual festival. Join us for an unforgettable time
                    filled with great vibes and amazing performances.</p>
            </div>
            <div class="content" id="content2">
                <h1>Content 2</h1>
                <p>More info...</p>
            </div>
            <div class="content" id="content3">
                <h1>Content 3</h1>
                <p>More info...</p>
            </div>
            <div class="content" id="content4">
                <h1>Content 4</h1>
                <p>More info...</p>
            </div>
        </main>
        <footer>
            <button onclick="showContent(1);">1</button>
            <button onclick="showContent(2);">2</button>
            <button onclick="showContent(3);">3</button>
            <button onclick="showContent(4);">4</button>
        </footer>
    </div>
    <script>
        function showContent(contentNumber) {
            hideAllContents();
            const contents = document.querySelector('#content' + contentNumber);
            contents.style.display = 'block';
        }
        function hideAllContents() {
            const contents = document.querySelectorAll('.content');
            contents.forEach(content => {
                content.style.display = 'none';
            });
        }
        showContent(1);
    </script>
</body>

</html>
